<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> gallery - 途喵-独行侠 SoloWander</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2D4A3E; --secondary: #8B9A7D; --accent: #D4A574; --light: #F8F6F3; --dark: #1A1A1A; --text: #3D3D3D; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; color: var(--text); background: var(--light); line-height: 1.8; }
        
        nav { position: fixed; top: 0; left: 0; right: 0; padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(248,246,243,0.95); backdrop-filter: blur(20px); z-index: 1000; }
        .logo { font-family: 'Noto Serif SC', serif; font-size: 1.5rem; font-weight: 700; color: var(--primary); text-decoration: none; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 2rem; list-style: none; flex-wrap: wrap; }
        .nav-links a { color: var(--text); text-decoration: none; font-size: 0.9rem; font-weight: 500; }
        .nav-links a:hover { color: var(--primary); }
        
        .hero { padding: 12rem 5% 3rem; background: linear-gradient(135deg, var(--accent), #c4956a); color: white; text-align: center; }
        .hero h1 { font-family: 'Noto Serif SC', serif; font-size: 2.8rem; margin-bottom: 1rem; }
        
        .container { padding: 3rem 5%; max-width: 1200px; margin: 0 auto; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .gallery-item { position: relative; border-radius: 16px; overflow: hidden; aspect-ratio: 1; cursor: pointer; transition: all 0.3s; }
        .gallery-item:hover { transform: scale(1.02); }
        .gallery-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 5rem; }
        .gallery-item:nth-child(odd) .gallery-placeholder { background: linear-gradient(135deg, #ff9a9e, #fecfef); }
        .gallery-item:nth-child(even) .gallery-placeholder { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
        .gallery-item:nth-child(3n) .gallery-placeholder { background: linear-gradient(135deg, #84fab0, #8fd3f4); }
        .gallery-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 1.5rem; background: linear-gradient(transparent, rgba(0,0,0,0.7)); color: white; }
        .gallery-overlay h4 { margin-bottom: 0.3rem; }
        .gallery-overlay p { font-size: 0.85rem; opacity: 0.8; }
        
        footer { background: var(--dark); color: white; padding: 3rem 5%; text-align: center; margin-top: 4rem; }
    </style>
</head>
